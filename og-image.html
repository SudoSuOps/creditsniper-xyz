<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px;
  background: #050505;
  font-family: 'Space Grotesk', system-ui, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
/* Crosshair background */
.crosshair {
  position: absolute;
  width: 400px; height: 400px;
  border: 2px solid rgba(245,158,11,0.08);
  border-radius: 50%;
  top: 50%; left: 70%;
  transform: translate(-50%, -50%);
}
.crosshair::before {
  content: '';
  position: absolute;
  width: 250px; height: 250px;
  border: 1px solid rgba(245,158,11,0.06);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.crosshair-h, .crosshair-v {
  position: absolute;
  background: rgba(245,158,11,0.06);
}
.crosshair-h { width: 500px; height: 1px; top: 50%; left: 55%; transform: translate(-50%, -50%); }
.crosshair-v { width: 1px; height: 500px; top: 50%; left: 70%; transform: translate(-50%, -50%); }
.dot { position: absolute; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; top: 50%; left: 70%; transform: translate(-50%, -50%); opacity: 0.6; }

.content {
  position: relative; z-index: 2;
  padding: 80px 100px;
  width: 100%;
}
.bee { font-size: 64px; margin-bottom: 16px; }
h1 {
  font-size: 72px; font-weight: 700; color: #e8e8e8;
  letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 16px;
}
h1 span { color: #f59e0b; }
.sub {
  font-size: 24px; color: #a0a0a0; font-weight: 400;
  font-family: 'DM Sans', system-ui, sans-serif;
  line-height: 1.5; max-width: 700px;
}
.badge {
  display: inline-block; margin-top: 24px;
  background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2);
  padding: 8px 20px; border-radius: 6px;
  font-size: 16px; color: #f59e0b; font-weight: 600;
  letter-spacing: 0.02em;
}
.footer {
  position: absolute; bottom: 40px; left: 100px; right: 100px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 16px; color: #5a5a5a;
}
.footer .brand { color: #a0a0a0; font-weight: 500; }
.footer .brand span { color: #f59e0b; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=DM+Sans:wght@400&display=swap" rel="stylesheet">
</head>
<body>

<div class="crosshair"></div>
<div class="crosshair-h"></div>
<div class="crosshair-v"></div>
<div class="dot"></div>

<div class="content">
  <div class="bee">🐝</div>
  <h1>Credit<span>Sniper</span></h1>
  <p class="sub">AI that reads your credit report, finds violations, writes dispute letters, and mails them.</p>
  <div class="badge">$49/mo unlimited &middot; FCRA &middot; FDCPA &middot; We are healers only</div>
</div>

<div class="footer">
  <span>creditsniper.xyz</span>
  <span class="brand">swarm<span>&</span>bee</span>
</div>

</body>
</html>
