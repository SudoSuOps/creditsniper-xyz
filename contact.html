<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — CreditSniper</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050505;--surface-2:#141414;--border:#1e1e1e;--primary:#f59e0b;--accent:#fbbf24;--text:#e8e8e8;--text-2:#a0a0a0;--text-3:#5a5a5a;--radius:8px;--font:'DM Sans',system-ui,sans-serif;--heading:'Space Grotesk',system-ui,sans-serif;--green:#22c55e;--red:#ef4444}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
a{color:var(--primary);text-decoration:none}
.box{width:100%;max-width:480px}
.logo{font-family:var(--heading);font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:24px}
.logo span{color:var(--primary)}
.card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:32px}
.card h2{font-family:var(--heading);font-size:1.2rem;margin-bottom:4px}
.card>p{font-size:.88rem;color:var(--text-2);margin-bottom:20px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.82rem;color:var(--text-3);margin-bottom:4px}
.fg input,.fg textarea{width:100%;padding:10px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--font);font-size:.9rem;outline:none}
.fg input:focus,.fg textarea:focus{border-color:var(--primary)}
.fg textarea{min-height:100px;resize:vertical}
.btn{width:100%;padding:12px;border:none;border-radius:6px;background:var(--primary);color:#050505;font-weight:600;font-size:.95rem;cursor:pointer;font-family:var(--font)}
.status{font-size:.82rem;text-align:center;margin-top:12px;min-height:1.5em}
.links{text-align:center;margin-top:20px;font-size:.82rem;color:var(--text-3)}
.links a{margin:0 8px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Credit<span>Sniper</span></div>
  <div class="card">
    <h2>Contact us</h2>
    <p>Questions, feedback, or partnership inquiries.</p>
    <form onsubmit="return sendContact(event)">
      <div class="fg">
        <label>Email</label>
        <input type="email" id="c-email" required placeholder="you@email.com">
      </div>
      <div class="fg">
        <label>Subject</label>
        <input type="text" id="c-subject" required placeholder="How can we help?">
      </div>
      <div class="fg">
        <label>Message</label>
        <textarea id="c-message" required placeholder="Tell us more..."></textarea>
      </div>
      <button type="submit" class="btn">Send Message</button>
      <p class="status" id="c-status"></p>
    </form>
  </div>
  <div class="links">
    <a href="/">Home</a>
    <a href="/pricing">Pricing</a>
    <a href="/app">Launch App</a>
  </div>
</div>
<script>
function sendContact(e) {
  e.preventDefault();
  var email = document.getElementById('c-email').value.trim();
  var subject = document.getElementById('c-subject').value.trim();
  var message = document.getElementById('c-message').value.trim();
  var status = document.getElementById('c-status');
  var btn = e.target.querySelector('button');
  btn.textContent = 'Sending...'; btn.disabled = true;

  fetch('https://discord.com/api/webhooks/1485069668573122591/LOI8UffI6GQEH5SRuFG_iVq0MgVXH0wKZTFpno09DKGx91cHmZmtvnP6EI3g8N-eyGGd', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      embeds: [{
        title: 'CreditSniper Contact Form',
        color: 16030475,
        fields: [
          {name: 'Email', value: email, inline: true},
          {name: 'Subject', value: subject, inline: true},
          {name: 'Message', value: message}
        ],
        footer: {text: 'creditsniper.xyz/contact'},
        timestamp: new Date().toISOString()
      }]
    })
  })
  .then(function(r) {
    if (r.ok || r.status === 204) {
      status.style.color = 'var(--green)';
      status.textContent = 'Message sent. We will get back to you.';
      e.target.reset();
    } else {
      throw new Error('Failed');
    }
  })
  .catch(function() {
    window.location.href = 'mailto:build@swarmandbee.ai?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(message + '\n\nFrom: ' + email);
    status.style.color = 'var(--primary)';
    status.textContent = 'Opening email...';
  })
  .finally(function() { btn.textContent = 'Send Message'; btn.disabled = false; });
  return false;
}
</script>
</body>
</html>
