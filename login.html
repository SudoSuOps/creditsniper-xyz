<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreditSniper — Sign In</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050505;--surface:#0e0e0e;--surface-2:#141414;--border:#1e1e1e;--primary:#f59e0b;--accent:#fbbf24;--text:#e8e8e8;--text-2:#a0a0a0;--text-3:#5a5a5a;--radius:8px;--font:'DM Sans',system-ui,sans-serif;--heading:'Space Grotesk',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--green:#22c55e;--red:#ef4444}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
a{color:var(--primary);text-decoration:none}
.login-box{width:100%;max-width:420px}
.logo{font-family:var(--heading);font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:32px}
.logo span{color:var(--primary)}
.card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:32px}
.card h2{font-family:var(--heading);font-size:1.2rem;margin-bottom:8px}
.card p{font-size:.88rem;color:var(--text-2);margin-bottom:20px}
.tabs{display:flex;gap:0;margin-bottom:24px}
.tab{flex:1;padding:10px;text-align:center;font-size:.88rem;font-weight:500;cursor:pointer;border-bottom:2px solid var(--border);color:var(--text-3);transition:all .2s}
.tab.active{border-bottom-color:var(--primary);color:var(--primary)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.82rem;color:var(--text-3);margin-bottom:4px}
.form-group input{width:100%;padding:10px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--font);font-size:.9rem;outline:none}
.form-group input:focus{border-color:var(--primary)}
.btn{width:100%;padding:12px;border:none;border-radius:6px;font-weight:600;font-size:.95rem;cursor:pointer;font-family:var(--font);margin-top:8px}
.btn-primary{background:var(--primary);color:#050505}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.status{font-size:.82rem;text-align:center;margin-top:12px;min-height:1.5em}
.divider{text-align:center;font-size:.78rem;color:var(--text-3);margin:16px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border)}
.divider::before{left:0}
.divider::after{right:0}
.footer-links{text-align:center;margin-top:20px;font-size:.82rem;color:var(--text-3)}
.footer-links a{margin:0 8px}
</style>
</head>
<body>

<div class="login-box">
  <div class="logo">Credit<span>Sniper</span></div>

  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="showTab('signin')">Sign In</div>
      <div class="tab" onclick="showTab('signup')">Sign Up</div>
    </div>

    <!-- SIGN IN -->
    <div id="signin-form">
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="signin-key" placeholder="cs_live_... or sb_live_...">
      </div>
      <button class="btn btn-primary" onclick="signIn()">Sign In</button>
      <p class="status" id="signin-status"></p>
    </div>

    <!-- SIGN UP -->
    <div id="signup-form" style="display:none">
      <p>Get a free account with 1 report analysis and 2 letter drafts.</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@email.com">
      </div>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="signup-name" placeholder="First name">
      </div>
      <button class="btn btn-primary" onclick="signUp()">Create Free Account</button>
      <div class="divider">or</div>
      <button class="btn btn-outline" onclick="window.location.href='/pricing'">Subscribe — $49/mo Unlimited</button>
      <p class="status" id="signup-status"></p>
    </div>
  </div>

  <div class="footer-links">
    <a href="/">Home</a>
    <a href="/pricing">Pricing</a>
    <a href="mailto:build@swarmandbee.ai">Help</a>
  </div>
</div>

<script>
function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('signin-form').style.display = tab === 'signin' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  event.target.classList.add('active');
}

function signIn() {
  var key = document.getElementById('signin-key').value.trim();
  var status = document.getElementById('signin-status');
  if (!key) { status.style.color = 'var(--red)'; status.textContent = 'Enter your API key'; return; }

  status.style.color = 'var(--primary)';
  status.textContent = 'Checking...';

  fetch('https://router.swarmandbee.ai/wallet/balance', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-API-Key': key }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.balance !== undefined) {
      localStorage.setItem('cs_api_key', key);
      status.style.color = 'var(--green)';
      status.textContent = 'Signed in. Redirecting...';
      setTimeout(function() { window.location.href = '/app'; }, 500);
    } else {
      status.style.color = 'var(--red)';
      status.textContent = 'Invalid API key. Check and try again.';
    }
  })
  .catch(function() {
    status.style.color = 'var(--red)';
    status.textContent = 'Connection error. Try again.';
  });
}

function signUp() {
  var email = document.getElementById('signup-email').value.trim();
  var name = document.getElementById('signup-name').value.trim();
  var status = document.getElementById('signup-status');

  if (!email) { status.style.color = 'var(--red)'; status.textContent = 'Enter your email'; return; }

  status.style.color = 'var(--primary)';
  status.textContent = 'Creating account...';

  fetch('https://router.swarmandbee.ai/subscribe', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, name: name, source: 'creditsniper' })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.ok || (data.message && data.message.includes('already'))) {
      status.style.color = 'var(--green)';
      status.textContent = 'Check your email for your API key. Then sign in above.';
    } else {
      status.style.color = 'var(--red)';
      status.textContent = data.message || 'Something went wrong.';
    }
  })
  .catch(function() {
    status.style.color = 'var(--red)';
    status.textContent = 'Connection error. Try again.';
  });
}

// Auto-redirect if already signed in
if (localStorage.getItem('cs_api_key')) {
  window.location.href = '/app';
}
</script>

</body>
</html>
