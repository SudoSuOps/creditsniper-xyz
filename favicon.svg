<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Crosshair circle -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.3"/>
  <circle cx="32" cy="32" r="18" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.2"/>
  <!-- Crosshair lines -->
  <line x1="32" y1="2" x2="32" y2="14" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <line x1="32" y1="50" x2="32" y2="62" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <line x1="2" y1="32" x2="14" y2="32" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <line x1="50" y1="32" x2="62" y2="32" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <!-- Bee/wasp body -->
  <ellipse cx="32" cy="35" rx="9" ry="11" fill="#f59e0b"/>
  <!-- Stripes -->
  <rect x="23" y="31" width="18" height="2.5" rx="1" fill="#050505" opacity="0.7"/>
  <rect x="23" y="36" width="18" height="2.5" rx="1" fill="#050505" opacity="0.7"/>
  <!-- Head -->
  <circle cx="32" cy="22" r="6" fill="#f59e0b"/>
  <!-- Eyes — sharp, aggressive -->
  <ellipse cx="29" cy="21" rx="2" ry="1.5" fill="#050505"/>
  <ellipse cx="35" cy="21" rx="2" ry="1.5" fill="#050505"/>
  <circle cx="29.5" cy="20.5" r="0.6" fill="#ef4444"/>
  <circle cx="35.5" cy="20.5" r="0.6" fill="#ef4444"/>
  <!-- Wings — sharp wasp wings -->
  <path d="M23 28 Q14 20 18 14" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.4"/>
  <path d="M41 28 Q50 20 46 14" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="19" cy="24" rx="6" ry="4" fill="#fbbf24" opacity="0.15" transform="rotate(-30 19 24)"/>
  <ellipse cx="45" cy="24" rx="6" ry="4" fill="#fbbf24" opacity="0.15" transform="rotate(30 45 24)"/>
  <!-- Stinger — sharp -->
  <polygon points="32,46 29,52 32,54 35,52" fill="#ef4444" opacity="0.9"/>
  <!-- Antennae -->
  <line x1="28" y1="17" x2="23" y2="10" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="17" x2="41" y2="10" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="23" cy="10" r="1.2" fill="#fbbf24"/>
  <circle cx="41" cy="10" r="1.2" fill="#fbbf24"/>
  <!-- Target center dot -->
  <circle cx="32" cy="32" r="1.5" fill="#ef4444"/>
</svg>
